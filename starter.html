    <!-- Open Graph -->
    <meta property="og:title" content="Lesekumpel — Dein Leseabenteuer beginnt bald">

    <link rel="stylesheet" href="fonts/fonts.css">

    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-body: #FFF9E5;
            --bg-warm-light: #FFF3D0;
            --accent-coral: #D67171;
            --accent-coral-light: #FDEAEA;
            --primary-yellow: #FFD54F;
            --text-dark: #2D3436;
            --text-muted: #5a6368;
            --font-heading: 'Fredoka', sans-serif;
            --font-body: 'Quicksand', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background: radial-gradient(ellipse at center, #FFFDF5 0%, #FFF3D0 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px;
            overflow: hidden;
            position: relative;
        }

        /* ========== FLOATING DECORATIONS ========== */
        .floating-deco {
            position: absolute;
            pointer-events: none;
            z-index: 0;
            will-change: transform;
        }

        .deco-star {
            width: 32px;
            height: 32px;
            animation: float 6s ease-in-out infinite;
            filter: drop-shadow(0 0 6px rgba(255, 213, 79, 0.4));
        }

        .deco-circle {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            animation: float-slow 8s ease-in-out infinite;
        }

        .deco-sparkle {
            width: 16px;
            height: 16px;
            animation: sparkle 4s ease-in-out infinite;
        }

        .deco-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: float 5s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-18px) rotate(5deg); }
        }

        @keyframes float-slow {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-12px) rotate(-3deg); }
        }

        @keyframes sparkle {
            0%, 100% { opacity: 0.35; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1.15); }
            50% { opacity: 0.9; transform: scale(1.2); }
            70% { opacity: 1; transform: scale(1.1); }
        }

        /* ========== MAIN CONTENT ========== */
        main {
            text-align: center;
            max-width: 600px;
            animation: fadeIn 0.8s ease-out;
            position: relative;
            z-index: 1;
        }

        .logo {
            width: clamp(100px, 30vw, 160px);
            height: auto;
            margin-bottom: 40px;
            border-radius: 50%;
            filter: drop-shadow(0 6px 20px rgba(180, 120, 80, 0.18));
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1),
                        filter 0.4s ease;
        }

        .logo:hover {
            transform: scale(1.1) rotate(-5deg);
            filter: drop-shadow(0 10px 28px rgba(180, 120, 80, 0.28));
        }

        h1 {
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: clamp(1.6rem, 5vw, 2.5rem);
            color: var(--text-dark);
            line-height: 1.3;
            margin-bottom: 12px;
        }

        h1 .highlight {
            color: #B85555;
            font-weight: 700;
        }

        .subtitle {
            font-family: var(--font-heading);
            font-weight: 500;
            font-size: clamp(1rem, 3vw, 1.3rem);
            color: var(--text-muted);
            opacity: 0.7;
            margin-bottom: 36px;
        }

        .features {
            display: flex;
            flex-direction: column;
            gap: 16px;
            align-items: center;
        }

        .feature-line {
            font-size: clamp(0.9rem, 2.2vw, 1.05rem);
            font-weight: 500;
            color: var(--text-muted);
            line-height: 1.7;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feature-line .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 10px;
            background: var(--accent-coral-light);
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.06);
            flex-shrink: 0;
            font-size: 16px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .deco-hide-mobile {
                display: none;
            }
        }

        footer {
            position: absolute;
            bottom: 24px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-muted);
            opacity: 0.7;
            z-index: 1;
        }

        .footer-icons {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 10px;
        }

        .footer-icons a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--accent-coral-light);
            color: var(--accent-coral);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1),
                        background 0.3s ease;
        }

        .footer-icons a:hover {
            transform: scale(1.15);
            background: var(--accent-coral);
            color: #fff;
        }

        .footer-icons svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        @media (prefers-reduced-motion: reduce) {
            main { animation: none; }
            .logo { transition: none; }
            .floating-deco { animation: none !important; }
        }
    </style>
</head>
<body>
